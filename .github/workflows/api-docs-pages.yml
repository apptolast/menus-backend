# =============================================================================
# Workflow: Generate & Publish OpenAPI Documentation to GitHub Pages
# =============================================================================
# Starts the Spring Boot app with a PostgreSQL service container, fetches the
# OpenAPI spec from /v3/api-docs, generates static HTML with Redocly, and
# deploys to GitHub Pages with both Redocly docs and Swagger UI.
#
# Official documentation:
#   - springdoc-openapi 3.0.x: https://springdoc.org/v3/
#   - Redocly CLI: https://github.com/Redocly/redoc
#   - GitHub Pages: https://docs.github.com/en/pages
# =============================================================================

name: API Docs — Generate & Publish to GitHub Pages

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/main/kotlin/**'
      - 'src/main/resources/application*.yml'
      - 'build.gradle.kts'
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  generate-docs:
    name: Generate OpenAPI Spec & Static Docs
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: menusdb_docs
          POSTGRES_USER: menus_docs
          POSTGRES_PASSWORD: menus_docs
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build application (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Start application in background
        run: |
          ./gradlew bootRun --no-daemon &
          echo $! > app.pid
          echo "App PID: $(cat app.pid)"
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/menusdb_docs
          DATABASE_USERNAME: menus_docs
          DATABASE_PASSWORD: menus_docs
          JWT_SECRET: docs-generation-secret-key-minimum-64-bytes-long-for-hs512-algorithm-placeholder
          ENCRYPTION_KEY: docs-generation-encrypt-32bytes!
          CORS_ORIGINS: http://localhost:3000

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Application is ready (attempt $i)"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Application did not start within 120 seconds"
              exit 1
            fi
            sleep 2
          done

      - name: Fetch OpenAPI spec
        run: |
          HTTP_CODE=$(curl -s -w "%{http_code}" -o openapi-raw.json http://localhost:8080/v3/api-docs)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to fetch OpenAPI spec (HTTP $HTTP_CODE)"
            exit 1
          fi
          cat openapi-raw.json | jq '.' > openapi.json
          rm openapi-raw.json
          echo "OpenAPI spec fetched: $(wc -c < openapi.json) bytes"
          echo "API title: $(jq -r '.info.title' openapi.json)"
          echo "Endpoints: $(jq '[.paths | to_entries[] | .value | keys[]] | length' openapi.json)"

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" 2>/dev/null || true
            rm app.pid
          fi

      - name: Generate static HTML docs with Redocly
        run: |
          mkdir -p docs-site
          npx -y @redocly/cli build-docs openapi.json --output docs-site/index.html
          echo "Static docs generated: $(wc -c < docs-site/index.html) bytes"

      - name: Add Swagger UI page
        run: |
          cp openapi.json docs-site/openapi.json
          cat > docs-site/swagger.html << 'SWAGGER_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Menus API — Swagger UI</title>
            <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
            <script>
              SwaggerUI({ url: './openapi.json', dom_id: '#swagger-ui' });
            </script>
          </body>
          </html>
          SWAGGER_EOF

      - name: Upload docs-site as Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/

      - name: Upload openapi.json as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 90

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: generate-docs
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
