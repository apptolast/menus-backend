# Traefik IngressRoute for development environment
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: menus-backend-dev
  namespace: apptolast-menus-dev
  annotations:
    kubernetes.io/description: "Menus Backend API — Development"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`menus-api-dev.apptolast.com`)
      kind: Rule
      middlewares:
        - name: menus-ratelimit
        - name: menus-security-headers
      services:
        - name: menus-backend
          port: 80
  tls:
    certResolver: letsencrypt
