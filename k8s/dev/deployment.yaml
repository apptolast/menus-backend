apiVersion: apps/v1
kind: Deployment
metadata:
  name: menus-backend
  namespace: apptolast-menus-dev
  labels:
    app: menus-backend
    app.kubernetes.io/name: menus-backend
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: menus-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: menus-backend
    spec:
      containers:
        - name: menus-backend
          image: apptolast/menus-backend:develop
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: menus-backend-config
            - secretRef:
                name: menus-backend-secret
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: menus-backend-secret
                  key: REDIS_PASSWORD
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      securityContext:
        fsGroup: 1000
