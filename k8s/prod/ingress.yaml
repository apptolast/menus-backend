# Traefik IngressRoute for production environment
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: menus-backend-prod
  namespace: apptolast-menus-prod
  annotations:
    kubernetes.io/description: "Menus Backend API — Production"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`menus-api.apptolast.com`)
      kind: Rule
      middlewares:
        - name: menus-ratelimit
        - name: menus-security-headers
      services:
        - name: menus-backend
          port: 80
  tls:
    certResolver: letsencrypt
